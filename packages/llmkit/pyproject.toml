[build-system]
requires = ["uv_build>=0.11.17,<0.12"]
build-backend = "uv_build"

[project]
name = "llmkit"
version = "0.1.0"
description = "A minimal implementation of GPT for educational purposes"
readme = "README.md"
requires-python = ">=3.8"
authors = [
    {name = "Based on build-nanogpt by Andrej Karpathy"},
]
dependencies = [
    "torch>=2.0.0",
    "numpy>=1.24.0",
    "tiktoken>=0.5.0",
    "requests>=2.31.0",
    "tqdm>=4.66.0",
    "transformers>=4.35.0",
    "datasets>=2.14.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
]

# Scripts are available in the scripts/ directory
# They can be run directly: python scripts/train.py

[tool.uv.build-backend]
module-root = "."

[tool.black]
line-length = 120
target-version = ['py38', 'py39', 'py310', 'py311']

[tool.ruff]
line-length = 120
target-version = "py38"
